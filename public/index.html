<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>線上型錄</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #f3f1ee;
            --bg-card: rgba(255, 255, 255, 0.7);
            --text-primary: #2d2d2d;
            --text-secondary: #5a5a5a;
            --text-muted: #8a8a8a;
            --accent: #c4a77d;
            --accent-light: #e8d9c0;
            --accent-glow: rgba(196, 167, 125, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(196, 167, 125, 0.25);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 12px 40px rgba(196, 167, 125, 0.15);
            --gradient-accent: rgba(196, 167, 125, 0.08);
            --border-color: rgba(196, 167, 125, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Serif TC', sans-serif;
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-primary) 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 30% 20%, var(--gradient-accent) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .header {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Noto Serif TC', serif;
            font-size: 24px;
            font-weight: 500;
        }

        .admin-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border: 1px solid var(--accent);
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            background: var(--accent);
            color: white;
        }

        .search-bar {
            max-width: 1400px;
            margin: 24px auto;
            padding: 0 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 20px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .filter-select {
            padding: 12px 20px;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            font-size: 15px;
            background: var(--glass-bg);
            color: var(--text-primary);
            font-family: inherit;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
        }

        .top-carousel {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, var(--gradient-accent) 0%, transparent 100%);
            overflow: hidden;
            margin-bottom: 40px;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(1.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        .carousel-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, var(--bg-primary) 0%, transparent 50%);
            pointer-events: none;
        }

        .carousel-info {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 20px 28px;
            border-radius: 16px;
            max-width: 500px;
            z-index: 10;
            box-shadow: var(--shadow-card);
        }

        .carousel-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .carousel-views {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .product-price {
            font-weight: 600;
            color: var(--accent);
        }

        .carousel-dots {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-muted);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .carousel-dot:hover {
            background: var(--text-secondary);
        }

        .carousel-dot.active {
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        .gallery-title {
            text-align: center;
            font-family: 'Noto Serif TC', serif;
            font-size: 36px;
            color: var(--text-primary);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .gallery-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 16px auto 0;
        }

        .masonry-grid {
            column-count: 4;
            column-gap: 24px;
        }

        @media (max-width: 1200px) {
            .masonry-grid { column-count: 3; }
        }

        @media (max-width: 768px) {
            .masonry-grid { column-count: 2; column-gap: 16px; }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 24px;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            border-radius: 16px;
            overflow: hidden;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
        }

        .masonry-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            background: var(--bg-secondary);
        }

        .image-info {
            padding: 16px 18px;
            background: linear-gradient(to top, var(--bg-card) 0%, var(--glass-bg) 100%);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .image-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .image-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .category-tag {
            font-size: 12px;
            padding: 2px 8px;
            background: var(--accent-light);
            border-radius: 10px;
            color: var(--text-secondary);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 20px;
            max-width: 800px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 32px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 32px;
            cursor: pointer;
            color: var(--text-secondary);
            background: none;
            border: none;
        }

        .modal-image {
            width: 100%;
            max-height: 400px;
            object-fit: contain;
            border-radius: 12px;
            background: var(--bg-secondary);
            margin-bottom: 20px;
        }

        .modal-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 24px;
            margin-bottom: 12px;
        }

        .modal-price {
            font-size: 28px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 16px;
        }

        .modal-description {
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 16px;
        }

        .modal-category {
            display: inline-block;
            padding: 4px 12px;
            background: var(--accent-light);
            border-radius: 20px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .thumbnails {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }

        .thumbnail {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s ease;
            border: 2px solid transparent;
        }

        .thumbnail:hover, .thumbnail.active {
            opacity: 1;
            border-color: var(--accent);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 24px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">線上型錄</div>
            <a href="/admin" class="admin-link">管理後台</a>
        </div>
    </header>

    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="搜尋商品..." oninput="handleSearch()">
        <select class="filter-select" id="categoryFilter" onchange="handleCategoryChange()">
            <option value="">所有分類</option>
        </select>
        <select class="filter-select" id="sortSelect" onchange="handleSortChange()">
            <option value="newest">最新上架</option>
            <option value="price_asc">價格：低到高</option>
            <option value="price_desc">價格：高到低</option>
        </select>
    </div>

    <div class="top-carousel">
        <div class="carousel-container" id="carousel">
            <div class="loading">
                <div class="spinner"></div>
                <p>載入中...</p>
            </div>
        </div>
    </div>

    <div class="gallery-container">
        <h1 class="gallery-title">精選商品</h1>
        <div class="masonry-grid" id="gallery">
            <div class="loading">
                <div class="spinner"></div>
                <p>載入商品中...</p>
            </div>
        </div>
    </div>

    <div class="modal" id="productModal">
        <div class="modal-content">
            <button class="modal-close" onclick="closeProductModal()">&times;</button>
            <img class="modal-image" id="productModalImage" src="" alt="">
            <h2 class="modal-title" id="productModalTitle"></h2>
            <div class="modal-price" id="productModalPrice"></div>
            <p class="modal-description" id="productModalDescription"></p>
            <span class="modal-category" id="productModalCategory"></span>
            <div class="thumbnails" id="productThumbnails"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api';
        let products = [];
        let categories = [];
        let carouselInterval = null;

        async function loadCategories() {
            try {
                const response = await fetch(`${API_URL}/categories`);
                categories = await response.json();
                renderCategoryFilter();
            } catch (error) {
                console.error('載入分類失敗:', error);
            }
        }

        function renderCategoryFilter() {
            const filter = document.getElementById('categoryFilter');
            filter.innerHTML = '<option value="">所有分類</option>' + 
                categories.map(cat => `<option value="${cat.id}">${cat.name}</option>`).join('');
        }

        async function loadProducts() {
            try {
                const search = document.getElementById('searchInput').value;
                const category = document.getElementById('categoryFilter').value;
                const sort = document.getElementById('sortSelect').value;

                let url = `${API_URL}/products?`;
                const params = new URLSearchParams();
                if (search) params.append('search', search);
                if (category) params.append('category', category);
                if (sort) params.append('sort', sort);
                url += params.toString();

                const response = await fetch(url);
                products = await response.json();

                renderFeaturedProducts();
                renderGallery();
            } catch (error) {
                console.error('載入商品失敗:', error);
                document.getElementById('gallery').innerHTML = '<div class="empty-state">載入失敗，請重新整理</div>';
            }
        }

        function renderFeaturedProducts() {
            const container = document.getElementById('carousel');
            const featured = products.filter(p => p.is_featured);

            if (featured.length === 0) {
                container.innerHTML = `
                    <div class="carousel-slide active">
                        <div class="carousel-info">
                            <div class="carousel-title">歡迎參觀我們的線上型錄</div>
                            <div class="carousel-views">精選商品將在此展示</div>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = featured.map((product, index) => `
                <div class="carousel-slide ${index === 0 ? 'active' : ''}">
                    <img src="${product.main_image || ''}" alt="${product.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23f3f1ee%22 width=%22200%22 height=%22200%22/><text fill=%22%238a8a8a%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22>無圖片</text></svg>'">
                    <div class="carousel-info">
                        <div class="carousel-title">${product.name}</div>
                        <div class="carousel-views">
                            <span class="product-price">$${parseFloat(product.price).toFixed(0)}</span>
                        </div>
                    </div>
                </div>
            `).join('') + '<div class="carousel-dots">' + 
                featured.map((_, i) => `<span class="carousel-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></span>`).join('') + 
                '</div>';

            if (featured.length > 1) {
                let currentIndex = 0;
                carouselInterval = setInterval(() => {
                    currentIndex = (currentIndex + 1) % featured.length;
                    goToSlide(currentIndex);
                }, 5000);
            }
        }

        function goToSlide(index) {
            const slides = document.querySelectorAll('.carousel-slide');
            const dots = document.querySelectorAll('.carousel-dot');
            slides.forEach(s => s.classList.remove('active'));
            dots.forEach(d => d.classList.remove('active'));
            slides[index]?.classList.add('active');
            dots[index]?.classList.add('active');
        }

        function renderGallery() {
            const container = document.getElementById('gallery');

            if (products.length === 0) {
                container.innerHTML = '<div class="empty-state">尚無商品資料</div>';
                return;
            }

            const aspectRatios = ['16:9', '9:16', '4:3', '3:4', '1:1', '3:2', '2:3'];

            container.innerHTML = products.map((product, index) => {
                const ratio = aspectRatios[index % aspectRatios.length];
                const height = ratio === '16:9' ? ' style="aspect-ratio: 16/9"' : 
                              ratio === '1:1' ? ' style="aspect-ratio: 1/1"' :
                              ratio === '4:3' ? ' style="aspect-ratio: 4/3"' : '';

                return `
                    <div class="masonry-item" onclick="openProductModal(${product.id})">
                        <img src="${product.main_image || ''}" alt="${product.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22200%22><rect fill=%22%23f3f1ee%22 width=%22300%22 height=%22200%22/><text fill=%22%238a8a8a%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22>無圖片</text></svg>'">
                        <div class="image-info">
                            <div class="image-title">${product.name}</div>
                            <div class="image-stats">
                                <span class="product-price">$${parseFloat(product.price).toFixed(0)}</span>
                                ${product.category_name ? `<span class="category-tag">${product.category_name}</span>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openProductModal(productId) {
            const product = products.find(p => p.id === productId);
            if (!product) return;

            if (carouselInterval) {
                clearInterval(carouselInterval);
            }

            document.getElementById('productModalImage').src = product.main_image || '';
            document.getElementById('productModalTitle').textContent = product.name;
            document.getElementById('productModalPrice').textContent = `$${parseFloat(product.price).toFixed(0)}`;
            document.getElementById('productModalDescription').textContent = product.description || '尚無商品描述';
            document.getElementById('productModalCategory').textContent = product.category_name || '無分類';

            if (product.images && product.images.length > 1) {
                const thumbs = document.getElementById('productThumbnails');
                thumbs.innerHTML = product.images.map((img, i) => `
                    <img src="${img.image_path}" class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeMainImage(this, '${img.image_path}')">
                `).join('');
                thumbs.style.display = 'flex';
            } else {
                document.getElementById('productThumbnails').style.display = 'none';
            }

            document.getElementById('productModal').classList.add('active');
        }

        function changeMainImage(el, src) {
            document.getElementById('productModalImage').src = src;
            document.querySelectorAll('.thumbnail').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('active');
            loadProducts();
        }

        function handleSearch() {
            loadProducts();
        }

        function handleCategoryChange() {
            loadProducts();
        }

        function handleSortChange() {
            loadProducts();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeProductModal();
        });

        document.getElementById('productModal').addEventListener('click', (e) => {
            if (e.target.id === 'productModal') closeProductModal();
        });

        document.addEventListener('DOMContentLoaded', () => {
            loadCategories();
            loadProducts();
        });
    </script>
</body>
</html>
