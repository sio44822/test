<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #faf9f7;
            --bg-secondary: #f3f1ee;
            --bg-card: rgba(255, 255, 255, 0.7);
            --text-primary: #2d2d2d;
            --text-secondary: #5a5a5a;
            --text-muted: #8a8a8a;
            --accent: #c4a77d;
            --accent-light: #e8d9c0;
            --accent-glow: rgba(196, 167, 125, 0.3);
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(196, 167, 125, 0.25);
            --shadow-card: 0 4px 20px rgba(0, 0, 0, 0.06);
            --shadow-hover: 0 12px 40px rgba(196, 167, 125, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Serif TC', sans-serif;
            background: linear-gradient(135deg, #fdfcfa 0%, #f8f6f3 50%, #f5f2ed 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(196, 167, 125, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 60%, rgba(180, 160, 140, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 90%, rgba(200, 185, 165, 0.05) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
        }

        /* 頂部輪播區域 */
        .top-carousel {
            position: relative;
            height: 450px;
            background: linear-gradient(180deg, rgba(196, 167, 125, 0.08) 0%, transparent 100%);
            overflow: hidden;
            margin-bottom: 40px;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(1.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-slide.active {
            opacity: 1;
            transform: scale(1);
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: var(--bg-secondary);
        }

        .carousel-slide::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(250, 249, 247, 0.85) 0%, transparent 50%);
            pointer-events: none;
        }

        .carousel-info {
            position: absolute;
            bottom: 40px;
            left: 40px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 20px 28px;
            border-radius: 16px;
            max-width: 500px;
            z-index: 10;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-card);
        }

        .carousel-info:hover {
            background: rgba(255, 255, 255, 0.85);
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        @media (max-width: 768px) {
            .carousel-info {
                bottom: 20px;
                left: 20px;
                right: 20px;
                padding: 16px 20px;
                border-radius: 12px;
                max-width: none;
            }
        }

        @media (max-width: 480px) {
            .carousel-info {
                bottom: 15px;
                left: 15px;
                right: 15px;
                padding: 14px 18px;
                border-radius: 10px;
            }
        }

        .carousel-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 8px;
            line-height: 1.3;
            word-wrap: break-word;
            overflow-wrap: break-word;
            letter-spacing: 0.02em;
        }

        .carousel-views {
            font-size: 14px;
            opacity: 0.8;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }

        .carousel-views svg {
            width: 16px;
            height: 16px;
            opacity: 0.6;
        }

        @media (max-width: 768px) {
            .carousel-title {
                font-size: 18px;
                margin-bottom: 6px;
            }
            
            .carousel-views {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .carousel-title {
                font-size: 16px;
                margin-bottom: 5px;
                font-weight: 500;
            }
            
            .carousel-views {
                font-size: 12px;
                opacity: 0.75;
            }
        }

        .carousel-dots {
            position: absolute;
            bottom: 40px;
            right: 40px;
            display: flex;
            gap: 12px;
            z-index: 10;
        }

        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(45, 45, 45, 0.2);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid transparent;
        }

        .carousel-dot:hover {
            background: rgba(45, 45, 45, 0.4);
            transform: scale(1.1);
        }

        .carousel-dot.active {
            background: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: scale(1.2);
            border-color: var(--accent-light);
        }

        @media (max-width: 768px) {
            .carousel-dots {
                bottom: 20px;
                right: 20px;
                gap: 10px;
            }

            .carousel-dot {
                width: 10px;
                height: 10px;
            }
        }

        @media (max-width: 480px) {
            .carousel-dots {
                bottom: 15px;
                right: 15px;
                gap: 8px;
            }

            .carousel-dot {
                width: 8px;
                height: 8px;
            }

            .carousel-dot.active {
                transform: scale(1.3);
            }
        }

        /* 瀑布流佈局 */
        .gallery-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }

        .gallery-title {
            text-align: center;
            font-family: 'Noto Serif TC', serif;
            font-size: 36px;
            color: var(--text-primary);
            margin-bottom: 40px;
            font-weight: 400;
            letter-spacing: 0.08em;
            position: relative;
        }

        .gallery-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            margin: 16px auto 0;
        }

        .masonry-grid {
            column-count: 4;
            column-gap: 24px;
        }

        @media (max-width: 1200px) {
            .masonry-grid {
                column-count: 3;
            }
        }

        @media (max-width: 768px) {
            .masonry-grid {
                column-count: 2;
                column-gap: 16px;
            }
        }

        @media (max-width: 480px) {
            .masonry-grid {
                column-count: 2;
                column-gap: 12px;
            }

            .carousel-info {
                max-width: calc(100% - 80px);
            }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 24px;
            position: relative;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 16px;
            overflow: hidden;
            background: white;
            border: 1px solid rgba(196, 167, 125, 0.15);
            box-shadow: var(--shadow-card);
        }

        .masonry-item::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(196, 167, 125, 0.08) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 1;
            pointer-events: none;
        }

        .masonry-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-hover);
            border-color: var(--accent-light);
        }

        .masonry-item:hover::before {
            opacity: 1;
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            background: var(--bg-secondary);
        }

        .masonry-item:hover img {
            transform: scale(1.08);
        }

        .image-info {
            padding: 16px 18px;
            background: linear-gradient(to top, rgba(255, 255, 255, 0.98) 0%, rgba(255, 255, 255, 0.95) 100%);
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .image-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: 0.01em;
        }

        .image-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .view-count {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-icon {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
            opacity: 0.6;
        }

        .image-title {
            font-size: 15px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 10px;
            letter-spacing: 0.01em;
        }

        .image-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .view-count {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .view-icon {
            width: 16px;
            height: 16px;
            fill: var(--text-secondary);
            opacity: 0.7;
        }

        /* 圖片放大模態框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(250, 249, 247, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            align-items: center;
            justify-content: center;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
            }
            to { 
                opacity: 1; 
            }
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: scaleIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes scaleIn {
            from { 
                opacity: 0;
                transform: scale(0.9);
            }
            to { 
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-image {
            max-width: 100%;
            max-height: 85vh;
            width: auto;
            height: auto;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.15);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: var(--text-primary);
            font-size: 32px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s ease;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--glass-border);
        }

        .modal-close:hover {
            background: white;
            transform: rotate(90deg);
            box-shadow: 0 0 30px var(--accent-glow);
        }

        .modal-info {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: var(--text-primary);
            padding: 16px 32px;
            border-radius: 14px;
            border: 1px solid var(--glass-border);
            text-align: center;
            box-shadow: var(--shadow-card);
        }

        .modal-title {
            font-family: 'Noto Serif TC', serif;
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .modal-views {
            font-size: 14px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .modal-views svg {
            width: 14px;
            height: 14px;
            opacity: 0.6;
        }

        /* 載入動畫 */
        .loading {
            text-align: center;
            padding: 60px 20px;
            font-size: 16px;
            color: var(--text-muted);
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(196, 167, 125, 0.2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 24px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 骨架屏載入效果 */
        .skeleton {
            background: linear-gradient(90deg, 
                rgba(196, 167, 125, 0.08) 25%, 
                rgba(196, 167, 125, 0.15) 50%, 
                rgba(196, 167, 125, 0.08) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 8px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(196, 167, 125, 0.1);
        }

        .skeleton-image {
            aspect-ratio: 4/3;
            background: linear-gradient(135deg, var(--bg-secondary) 0%, rgba(196, 167, 125, 0.1) 100%);
        }

        .skeleton-text {
            height: 16px;
            margin: 16px;
            border-radius: 4px;
            width: 60%;
        }

        .skeleton-text-sm {
            height: 12px;
            margin: 0 16px 16px;
            border-radius: 4px;
            width: 40%;
        }

        /* 圖片載入狀態 */
        .image-loading {
            background: var(--bg-secondary);
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .image-loading::after {
            content: "載入中...";
            font-size: 14px;
        }

        /* 輪播圖片載入優化 */
        .carousel-slide img {
            transition: opacity 0.5s ease;
        }

        .carousel-slide img:not([src]) {
            opacity: 0;
        }

        /* 圖片淡入效果 */
        .fade-in {
            animation: fadeInImage 0.5s ease forwards;
        }

        @keyframes fadeInImage {
            from { opacity: 0; transform: scale(1.02); }
            to { opacity: 1; transform: scale(1); }
        }

        /* 連結按鈕 */
        .link-btn {
            font-size: 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            color: var(--accent);
            text-decoration: none;
            margin-left: 16px;
            padding: 8px 20px;
            border: 1px solid var(--accent);
            border-radius: 20px;
            transition: all 0.3s ease;
            letter-spacing: 0.02em;
        }

        .link-btn:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        @media (max-width: 768px) {
            .gallery-title {
                font-size: 28px;
            }
            .link-btn {
                display: block;
                margin: 16px auto 0;
                font-size: 14px;
            }
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 24px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }

        }

        }

        }

            height: 16px;

        }

        .skeleton-text-sm {

        }

        }

        .link-btn:hover {
            background: var(--accent);
            color: white;

        }

        @media (max-width: 768px) {
            .gallery-title {
                font-size: 28px;
            }
            .link-btn {
                display: block;
                margin: 16px auto 0;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- 頂部熱門圖片輪播 -->
    <div class="top-carousel">
        <div class="carousel-container" id="carousel">
            <div class="loading">
                <div class="spinner"></div>
                <p>載入熱門圖片中...</p>
            </div>
        </div>
    </div>

    <!-- 圖片展示區 -->
    <div class="gallery-container">
        <h1 class="gallery-title">精選圖輯 <a href="functionico.html" class="link-btn">功能測試</a></h1>
        <div class="masonry-grid" id="gallery">
            <div class="loading">
                <div class="spinner"></div>
                <p>載入圖片中...</p>
            </div>
        </div>
    </div>

    <!-- 圖片放大模態框 -->
    <div class="modal" id="imageModal">
        <span class="modal-close" onclick="closeModal()">&times;</span>
        <div class="modal-content">
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-info">
                <div class="modal-title" id="modalTitle"></div>
                <div class="modal-views" id="modalViews"></div>
            </div>
        </div>
    </div>

    <script>
        // Google Sheets 整合管理
        class GoogleSheetsManager {
            constructor() {
                this.scriptUrl = 'https://script.google.com/macros/s/AKfycbzepvHVeOA8oj_ijZSqsyUCDenLfEcEjkrB4DNYIFdGHvjamkkOzPtOVnwVpoXnBv5Uog/exec'; // 需要替換為實際的 Apps Script URL
                this.isOnline = false;
            }

            async checkConnection() {
                try {
                    const response = await fetch(`${this.scriptUrl}?action=test`, {
                        method: 'GET',
                        mode: 'no-cors'
                    });
                    this.isOnline = true;
                    return true;
                } catch (error) {
                    console.log('Google Sheets 連線失敗，使用本地儲存');
                    this.isOnline = false;
                    return false;
                }
            }

            async logView(imageId, imageTitle, timestamp) {
                if (!this.isOnline) return false;

                try {
                    const formData = new FormData();
                    formData.append('action', 'logView');
                    formData.append('imageId', imageId);
                    formData.append('imageTitle', imageTitle);
                    formData.append('timestamp', timestamp);
                    formData.append('userAgent', navigator.userAgent);
                    formData.append('pageUrl', window.location.href);

                    const response = await fetch(this.scriptUrl, {
                        method: 'POST',
                        body: formData,
                        mode: 'no-cors'
                    });
                    
                    console.log('Google Sheets 記錄成功');
                    return true;
                } catch (error) {
                    console.error('Google Sheets 記錄失敗:', error);
                    return false;
                }
            }

            async getViewCounts() {
                if (!this.isOnline) return null;

                try {
                    const response = await fetch(`${this.scriptUrl}?action=getCounts`, {
                        method: 'GET',
                        mode: 'cors'
                    });
                    
                    if (response.ok) {
                        const data = await response.json();
                        return data;
                    }
                } catch (error) {
                    console.error('獲取 Google Sheets 計數失敗:', error);
                }
                
                return null;
            }
        }

        // 圖片數據管理
        class ImageGallery {
            constructor() {
                this.images = [];
                this.topImages = [];
                this.viewCounts = this.loadViewCounts();
                this.googleSheets = new GoogleSheetsManager();
                this.aspectRatios = [
                    { ratio: '16:9', width: 16, height: 9 },
                    { ratio: '9:16', width: 9, height: 16 },
                    { ratio: '4:3', width: 4, height: 3 },
                    { ratio: '3:4', width: 3, height: 4 },
                    { ratio: '1:1', width: 1, height: 1 },
                    { ratio: '3:2', width: 3, height: 2 },
                    { ratio: '2:3', width: 2, height: 3 }
                ];
            }

            async init() {
                // 檢查 Google Sheets 連線
                await this.googleSheets.checkConnection();
                
                // 如果 Google Sheets 可用，嘗試同步數據
                if (this.googleSheets.isOnline) {
                    const serverCounts = await this.googleSheets.getViewCounts();
                    if (serverCounts) {
                        // 合併本地和伺服器數據
                        Object.keys(serverCounts).forEach(imageId => {
                            const localCount = this.viewCounts[imageId] || 0;
                            const serverCount = serverCounts[imageId] || 0;
                            this.viewCounts[imageId] = Math.max(localCount, serverCount);
                        });
                        this.saveViewCounts();
                    }
                }
            }

            loadViewCounts() {
                const saved = localStorage.getItem('imageViewCounts');
                return saved ? JSON.parse(saved) : {};
            }

            saveViewCounts() {
                localStorage.setItem('imageViewCounts', JSON.stringify(this.viewCounts));
            }

            async incrementView(imageId, imageTitle) {
                // 更新本地計數
                this.viewCounts[imageId] = (this.viewCounts[imageId] || 0) + 1;
                this.saveViewCounts();
                
                // 記錄到 Google Sheets
                if (this.googleSheets.isOnline) {
                    const timestamp = new Date().toISOString();
                    await this.googleSheets.logView(imageId, imageTitle, timestamp);
                }
                
                return this.viewCounts[imageId];
            }

            getViewCount(imageId) {
                return this.viewCounts[imageId] || 0;
            }

            generateImages(count) {
                const images = [];
                for (let i = 1; i <= count; i++) {
                    const aspectRatio = this.aspectRatios[Math.floor(Math.random() * this.aspectRatios.length)];
                    const width = aspectRatio.width * 100;
                    const height = aspectRatio.height * 100;
                    
                    // 使用固定的 ID 和 seed，確保每次刷新頁面都是同一張圖片
                    const imageId = `img_stable_${i}`;
                    const seed = `stable_image_${i}`;
                    
                    images.push({
                        id: imageId,
                        title: `精美圖片 ${i}`,
                        url: `https://picsum.photos/seed/${seed}/${width}/${height}.jpg`,
                        thumbnailUrl: `https://picsum.photos/seed/${seed}/${Math.min(width, 400)}/${Math.min(height, 400)}.jpg`,
                        aspectRatio: aspectRatio.ratio,
                        width: width,
                        height: height,
                        views: this.getViewCount(imageId)
                    });
                }
                return images;
            }

            getTopImages(images, count = 10) {
                return [...images].sort((a, b) => b.views - a.views).slice(0, count);
            }
        }

        // 初始化圖片庫
        const gallery = new ImageGallery();

        // 輪播功能
        class Carousel {
            constructor() {
                this.currentIndex = 0;
                this.slides = [];
                this.interval = null;
                this.touchStartX = 0;
                this.touchEndX = 0;
                this.minSwipeDistance = 50;
            }

            init(images) {
                this.slides = images;
                this.render();
                this.startAutoPlay();
            }

            render() {
                const container = document.getElementById('carousel');
                container.innerHTML = '';

                this.slides.forEach((image, index) => {
                    const slide = document.createElement('div');
                    slide.className = `carousel-slide ${index === 0 ? 'active' : ''}`;
                    
                    // 直接使用 HTML 字符串創建，避免圖片載入問題
                    slide.innerHTML = `
                        <img id="${image.id}" src="${image.url}" alt="${image.title}" loading="lazy">
                        <div class="carousel-info">
                            <div class="carousel-title">${image.title}</div>
                            <div class="carousel-views">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                ${image.views} 次瀏覽
                            </div>
                        </div>
                    `;
                    
                    container.appendChild(slide);
                });

                // 添加圓點指示器
                const dotsContainer = document.createElement('div');
                dotsContainer.className = 'carousel-dots';
                this.slides.forEach((_, index) => {
                    const dot = document.createElement('span');
                    dot.className = `carousel-dot ${index === 0 ? 'active' : ''}`;
                    dot.onclick = () => this.goToSlide(index);
                    dotsContainer.appendChild(dot);
                });
                container.appendChild(dotsContainer);

                // 添加觸控事件監聽器
                this.addTouchListeners();

                // 延遲處理圖片載入錯誤
                setTimeout(() => {
                    this.handleImageErrors();
                }, 500);
            }

            handleImageErrors() {
                const images = document.querySelectorAll('.carousel-slide img');
                images.forEach(img => {
                    if (!img.complete || img.naturalWidth === 0) {
                        console.log('處理載入失敗的輪播圖片:', img.src);
                        const fallbackSrc = img.src.replace(/\/seed\/[^\/]+\//, '/seed/fallback/');
                        img.src = fallbackSrc;
                    }
                });
            }

            goToSlide(index) {
                const slides = document.querySelectorAll('.carousel-slide');
                const dots = document.querySelectorAll('.carousel-dot');

                slides.forEach(slide => slide.classList.remove('active'));
                dots.forEach(dot => dot.classList.remove('active'));

                this.currentIndex = index;
                slides[index].classList.add('active');
                dots[index].classList.add('active');
            }

            nextSlide() {
                const nextIndex = (this.currentIndex + 1) % this.slides.length;
                this.goToSlide(nextIndex);
            }

            startAutoPlay() {
                this.interval = setInterval(() => this.nextSlide(), 5000);
            }

            stopAutoPlay() {
                if (this.interval) {
                    clearInterval(this.interval);
                }
            }

            addTouchListeners() {
                const container = document.getElementById('carousel');
                
                // 觸控開始
                container.addEventListener('touchstart', (e) => {
                    this.touchStartX = e.touches[0].clientX;
                    this.stopAutoPlay(); // 暫停自動播放
                }, { passive: true });

                // 觸控結束
                container.addEventListener('touchend', (e) => {
                    this.touchEndX = e.changedTouches[0].clientX;
                    this.handleSwipe();
                    this.startAutoPlay(); // 重新開始自動播放
                }, { passive: true });
            }

            handleSwipe() {
                const swipeDistance = this.touchEndX - this.touchStartX;
                
                // 向右滑動（上一張）
                if (swipeDistance > this.minSwipeDistance) {
                    const prevIndex = this.currentIndex === 0 ? this.slides.length - 1 : this.currentIndex - 1;
                    this.goToSlide(prevIndex);
                }
                // 向左滑動（下一張）
                else if (swipeDistance < -this.minSwipeDistance) {
                    this.nextSlide();
                }
            }
        }

        // 瀑布流渲染
        function renderGallery(images) {
            const container = document.getElementById('gallery');
            container.innerHTML = '';

            images.forEach(image => {
                const item = document.createElement('div');
                item.className = 'masonry-item';
                item.onclick = () => openModal(image);

                item.innerHTML = `
                    <img id="${image.id}" src="${image.thumbnailUrl}" alt="${image.title}" loading="lazy">
                    <div class="image-info">
                        <div class="image-title">${image.title}</div>
                        <div class="image-stats">
                            <span class="view-count">
                                <svg class="view-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                ${image.views}
                            </span>
                            <span>${image.aspectRatio}</span>
                        </div>
                    </div>
                `;

                container.appendChild(item);
            });
        }

        // 模態框功能
        function openModal(image) {
            const modal = document.getElementById('imageModal');
            const modalImage = document.getElementById('modalImage');
            const modalTitle = document.getElementById('modalTitle');
            const modalViews = document.getElementById('modalViews');

            // 增加瀏覽次數
            const newViewCount = gallery.incrementView(image.id);
            
            // 設置圖片源，使用較大的尺寸以確保清晰度
            const largeWidth = Math.min(image.width * 2, 1920);
            const largeHeight = Math.min(image.height * 2, 1080);
            const seed = image.url.match(/\/seed\/([^\/]+)\//)[1];
            modalImage.src = `https://picsum.photos/seed/${seed}/${largeWidth}/${largeHeight}.jpg`;
            modalImage.setAttribute('data-image-id', image.id);
            
            modalTitle.textContent = image.title;
            modalViews.innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                </svg>
                ${newViewCount} 次瀏覽
            `;

            modal.classList.add('active');

            // 更新顯示的瀏覽次數
            setTimeout(() => updateViewCounts(), 100);
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            modal.classList.remove('active');
        }

        // 更新瀏覽次數顯示
        function updateViewCounts() {
            // 更新所有圖片的瀏覽次數
            gallery.images.forEach(image => {
                image.views = gallery.getViewCount(image.id);
            });

            // 更新瀑布流中的瀏覽次數，使用圖片 ID 而非索引
            gallery.images.forEach(image => {
                const imgElement = document.getElementById(image.id);
                if (imgElement) {
                    const viewCountElement = imgElement.closest('.masonry-item')?.querySelector('.view-count');
                    if (viewCountElement) {
                        const viewCount = gallery.getViewCount(image.id);
                        viewCountElement.innerHTML = `
                            <svg class="view-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            ${viewCount}
                        `;
                    }
                }
            });

            // 更新輪播中的瀏覽次數
            gallery.topImages.forEach(image => {
                const imgElement = document.getElementById(image.id);
                if (imgElement) {
                    const viewCountElement = imgElement.closest('.carousel-slide')?.querySelector('.carousel-views');
                    if (viewCountElement) {
                        const viewCount = gallery.getViewCount(image.id);
                        viewCountElement.innerHTML = `
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            ${viewCount} 次瀏覽
                        `;
                    }
                }
            });

            // 更新模態框中的瀏覽次數（如果打開）
            const modalImage = document.getElementById('modalImage');
            if (modalImage && modalImage.getAttribute('data-image-id')) {
                const imageId = modalImage.getAttribute('data-image-id');
                const modalViews = document.getElementById('modalViews');
                if (modalViews) {
                    const viewCount = gallery.getViewCount(imageId);
                    modalViews.innerHTML = `
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                        ${viewCount} 次瀏覽
                    `;
                }
            }
        }

        // 鍵盤事件
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // 點擊模態框背景關閉
        document.getElementById('imageModal').addEventListener('click', (e) => {
            if (e.target.id === 'imageModal' || e.target.classList.contains('modal-content')) {
                closeModal();
            }
        });

        // 圖片載入錯誤處理
        function handleImageError(img, fallbackUrl, retryCount = 0) {
            const maxRetries = 2;
            
            img.onerror = function() {
                console.log(`圖片載入失敗 (嘗試 ${retryCount + 1}/${maxRetries + 1}):`, img.src);
                
                if (retryCount < maxRetries) {
                    // 延遲重試
                    setTimeout(() => {
                        console.log('重新載入圖片...');
                        img.src = img.src + '&retry=' + Date.now();
                        handleImageError(img, fallbackUrl, retryCount + 1);
                    }, 1000 * (retryCount + 1)); // 遞增延遲時間
                } else {
                    // 超過重試次數，使用備用圖片
                    console.log('使用備用圖片');
                    img.src = fallbackUrl;
                    img.onerror = null;
                }
            };

            // 設置載入超時
            img.onload = function() {
                console.log('圖片載入成功:', img.src);
            };

            // 設置載入超時（5秒）
            setTimeout(() => {
                if (!img.complete) {
                    console.log('圖片載入超時，觸發錯誤處理');
                    img.onerror();
                }
            }, 5000);
        }

        // 初始化
        let carousel;

        async function initGallery() {
            try {
                // 生成圖片數據
                gallery.images = gallery.generateImages(30);
                
                // 獲取熱門圖片
                gallery.topImages = gallery.getTopImages(gallery.images, 10);
                
                // 初始化輪播
                carousel = new Carousel();
                carousel.init(gallery.topImages);
                
                // 渲染畫廊
                renderGallery(gallery.images);
                
                // 監聽圖片載入完成，添加淡入效果
                setTimeout(() => {
                    document.querySelectorAll('.masonry-item img').forEach(img => {
                        if (img.complete) {
                            img.classList.add('loaded');
                        } else {
                            img.onload = () => img.classList.add('loaded');
                        }
                    });
                }, 100);
                
                // 添加圖片錯誤處理（僅針對瀑布流圖片）
                setTimeout(() => {
                    document.querySelectorAll('.masonry-item img').forEach(img => {
                        const currentSrc = img.src;
                        const fallbackSrc = currentSrc.replace(/\/seed\/[^\/]+\//, '/seed/fallback/');
                        handleImageError(img, fallbackSrc);
                    });
                }, 200);
                
            } catch (error) {
                console.error('初始化失敗:', error);
                document.getElementById('carousel').innerHTML = '<div class="loading"><p>載入失敗，請重新整理頁面</p></div>';
                document.getElementById('gallery').innerHTML = '<div class="loading"><p>載入失敗，請重新整理頁面</p></div>';
            }
        }

        // 頁面載入完成後初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await gallery.init();
            await initGallery();
        });
    </script>
</body>
